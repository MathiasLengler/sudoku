[profile.default]
slow-timeout = { period = "0.5s", terminate-after = 5 }

[profile.default-miri]
slow-timeout = { period = "30s", terminate-after = 2 }
test-threads = 2


[profile.ci]
inherits = "default"
# Do not cancel the test run on the first failure.
fail-fast = false
slow-timeout = { period = "30s", terminate-after = 4 }

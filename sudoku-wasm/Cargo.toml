[package]
name = "sudoku-wasm"

# Wait for issure to be resolved: https://github.com/rustwasm/wasm-pack/issues/1180
authors.workspace = true
categories.workspace = true
description = "Touch optimized sudoku built with Rust/WASM/TypeScript/React."
edition.workspace = true
homepage = "https://sudoku.lengler.dev"
keywords.workspace = true
license = "MIT"
publish.workspace = true
repository = "https://github.com/MathiasLengler/sudoku"
rust-version.workspace = true
version.workspace = true

[lib]
crate-type = ["cdylib"]

[dependencies]
console_error_panic_hook = { version = "0.1.7", optional = true }
console_log = { version = "1.0.0", optional = true }
js-sys = "0.3.64"
log = { workspace = true }
serde = { workspace = true }
serde-wasm-bindgen = "0.5.0"
sudoku = { path = "../sudoku-rs", features = ["wasm"] }
anyhow = { workspace = true }

[dev-dependencies]
wasm-bindgen-test = "0.3.37"

[dependencies.web-sys]
version = "0.3.64"
features = [
    "Document",
    "Element",
    "HtmlElement",
    "Node",
    "Window",
]

[dependencies.wasm-bindgen]
version = "0.2.87"
features = ["serde-serialize"]

[features]
default = ["console"]
console = ["console_error_panic_hook", "console_log"]

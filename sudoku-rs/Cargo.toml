[package]
name = "sudoku"
version = "0.1.0"
authors = ["Mathias Lengler <mathias@lengler.dev>"]
edition = "2018"

[dependencies]
itertools = "0.10.1"
rand = "0.8.4"
getrandom = "0.2.3"
anyhow = "1.0.44"
lazy_static = "1.4.0"
serde = { version = "1.0.130", features = ["derive"] }
fixedbitset = "0.4.0"
bitvec = { version = "0.22.3", default-features = false, features = ["std"] }
num = "0.4.0"
indexmap = "1.7.0"
ndarray = "0.15.3"
generic-array = "0.14.4"
typenum = "1.14.0"
enum_dispatch = "0.3.7"
rayon = { version = "1.5.1", optional = true }
indicatif = { version = "0.16.2", optional = true }
crossterm = { version = "0.21.0", optional = true }
flame = { version = "0.2.2", optional = true }
flamer = { version = "0.4.0", optional = true }
arbitrary = { version = "1.0.2", features = ["derive"], optional = true }

[dev-dependencies]
criterion = "0.3.5"

[[bench]]
name = "sudoku_benchmark"
harness = false

[features]
default = []
debug_print = ["crossterm"]
parallel = ["rayon", "indicatif", "indicatif/rayon"]
wasm-bindgen = ["getrandom/js"]
flame_it = ["flame", "flamer"]
fuzz = ["arbitrary"]

[[bin]]
name = "generate_histogram"
required-features = ["parallel"]

[[bin]]
name = "solver_animation"
required-features = ["debug_print"]

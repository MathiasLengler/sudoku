[package]
name = "sudoku"
version = "0.1.0"
authors = ["Mathias Lengler <mathias@lengler.dev>"]
edition = "2021"

[dependencies]
log = "0.4.17"
itertools = "0.10.3"
rand = "0.8.5"
getrandom = "0.2.7"
anyhow = { version = "1.0.60", features = ["backtrace"] }
serde = { version = "1.0.143", features = ["derive"] }
indexmap = "1.9.1"
ndarray = "0.15.6"
typenum = "1.15.0"
enum_dispatch = "0.3.8"
num = "0.4.0"
tabled = { version = "0.8.0", features = ["color"] }
owo-colors = "3.4.0"
rayon = { version = "1.5.3", optional = true }
indicatif = { version = "0.17.0", optional = true }
crossterm = { version = "0.24.0", optional = true }
flame = { version = "0.2.2", optional = true }
flamer = { version = "0.4.0", optional = true }
arbitrary = { version = "1.1.3", features = ["derive"], optional = true }

[dev-dependencies]
criterion = { version = "0.4.0", features = ["html_reports"] }

[[bench]]
name = "sudoku_benchmark"
harness = false

[features]
default = []
debug_print = ["crossterm"]
parallel = ["rayon", "indicatif", "indicatif/rayon"]
wasm-bindgen = ["getrandom/js"]
flame_it = ["flame", "flamer"]
fuzz = ["arbitrary"]

[[bin]]
name = "generate_histogram"
required-features = ["parallel"]

[[bin]]
name = "solver_animation"
required-features = ["debug_print"]

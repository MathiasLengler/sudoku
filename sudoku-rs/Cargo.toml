[package]
name = "sudoku"

authors.workspace = true
categories.workspace = true
description.workspace = true
edition.workspace = true
homepage.workspace = true
keywords.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
# Workspace dependencies
anyhow = { workspace = true }
log = { workspace = true }
serde = { workspace = true, features = ["derive"] }
# Required dependencies
enum_dispatch = "0.3.12"
getrandom = "0.2.10"
indexmap = "2.0.0"
itertools = "0.11.0"
ndarray = "0.15.6"
num = "0.4.1"
owo-colors = "3.5.0"
papergrid = "0.10.0"
radix_fmt = "1.0.0"
rand = "0.8.5"
rand_xoshiro = "0.6.0"
strip-ansi-escapes = "0.2.0"
tabled = { version = "0.14.0", features = ["color"] }
# Optional dependencies enabled via features
crossterm = { version = "0.27.0", optional = true }
indicatif = { version = "0.17.6", optional = true }
rayon = { version = "1.7.0", optional = true }
ts-rs = { version = "7.0.0", optional = true }
hdrhistogram = { version = "7.5.2", optional = true }

[dev-dependencies]
serde_json = "1.0.105"

[target.'cfg(not(target_family="wasm"))'.dev-dependencies]
# version 0.5.1 seems broken, stay on 0.4.0 until fix is released.
criterion = { version = "0.4.0", features = ["html_reports"] }

[features]
default = []
terminal = ["crossterm"]
parallel = ["rayon", "indicatif", "indicatif/rayon"]
wasm = ["getrandom/js", "ts-rs"]
solver_debug_print = ["terminal"]
histogram = ["hdrhistogram"]

[[bench]]
name = "sudoku_benchmark"
harness = false

[[bin]]
name = "generate_histogram"
required-features = ["parallel", "terminal", "histogram"]

[[bin]]
name = "generate_tiled_corners"
required-features = ["histogram"]

[[bin]]
name = "generate_tiled_map"

[[bin]]
name = "solver_animation"
required-features = ["solver_debug_print"]

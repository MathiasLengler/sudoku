[package]
name = "sudoku"
version = "0.1.0"
authors = ["Mathias Lengler <mathias@lengler.dev>"]
edition = "2021"

[dependencies]
itertools = "0.10.3"
rand = "0.8.5"
getrandom = "0.2.6"
anyhow = "1.0.57"
serde = { version = "1.0.137", features = ["derive"] }
bitvec = { version = "1.0.0", default-features = false, features = ["std"] }
indexmap = "1.8.2"
ndarray = "0.15.4"
generic-array = "0.14.5"
typenum = "1.15.0"
enum_dispatch = "0.3.8"
rayon = { version = "1.5.3", optional = true }
indicatif = { version = "0.16.2", optional = true }
crossterm = { version = "0.23.2", optional = true }
flame = { version = "0.2.2", optional = true }
flamer = { version = "0.4.0", optional = true }
arbitrary = { version = "1.1.0", features = ["derive"], optional = true }

[dev-dependencies]
criterion = "0.3.6"

[[bench]]
name = "sudoku_benchmark"
harness = false

[features]
default = []
debug_print = ["crossterm"]
parallel = ["rayon", "indicatif", "indicatif/rayon"]
wasm-bindgen = ["getrandom/js"]
flame_it = ["flame", "flamer"]
fuzz = ["arbitrary"]

[[bin]]
name = "generate_histogram"
required-features = ["parallel"]

[[bin]]
name = "solver_animation"
required-features = ["debug_print"]

[package]
name = "sudoku"

authors.workspace = true
categories.workspace = true
description.workspace = true
edition.workspace = true
homepage.workspace = true
keywords.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
log = "0.4.17"
itertools = "0.10.3"
rand = "0.8.5"
rand_xoshiro = "0.6.0"
getrandom = "0.2.7"
anyhow = { version = "1.0.64", features = ["backtrace"] }
serde = { version = "1.0.144", features = ["derive"] }
indexmap = "1.9.1"
ndarray = "0.15.6"
enum_dispatch = "0.3.8"
num = "0.4.0"
tabled = { version = "0.8.0", features = ["color"] }
owo-colors = "3.5.0"
strip-ansi-escapes = "0.1.1"
rayon = { version = "1.5.3", optional = true }
indicatif = { version = "0.17.0", optional = true }
crossterm = { version = "0.25.0", optional = true }
arbitrary = { version = "1.1.6", features = ["derive"], optional = true }
ts-rs = { version = "6.2.0", optional = true }

[target.'cfg(not(target_family="wasm"))'.dev-dependencies]
criterion = { version = "0.4.0", features = ["html_reports"] }

[[bench]]
name = "sudoku_benchmark"
harness = false

[features]
default = []
terminal = ["crossterm"]
parallel = ["rayon", "indicatif", "indicatif/rayon"]
wasm = ["getrandom/js", "ts-rs"]
fuzz = ["arbitrary"]
solver_debug_print = ["terminal"]

[[bin]]
name = "generate_histogram"
required-features = ["parallel", "terminal"]

[[bin]]
name = "solver_animation"
required-features = ["solver_debug_print"]

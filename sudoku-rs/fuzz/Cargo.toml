[package]
name = "sudoku-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.2"

[dependencies.sudoku]
path = ".."
features = ["fuzz"]

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[[bin]]
name = "dynamic_sudoku_parse"
path = "fuzz_targets/dynamic_sudoku_parse.rs"

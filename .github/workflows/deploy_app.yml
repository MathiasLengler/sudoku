name: Deploy

on:
  push:
    branches:
      - master

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v3

      # Rust
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      # https://github.com/actions/cache/blob/main/examples.md#rust---cargo
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # https://doc.rust-lang.org/stable/clippy/usage.html#command-line
      - name: clippy
        run: cargo clippy -- -Dwarnings

      - run: cargo test

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - run: wasm-pack build --out-name index
        working-directory: ./sudoku-wasm

      # Node
      - uses: actions/setup-node@v3
        with:
          node-version-file: 'sudoku-web/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'sudoku-web/package-lock.json'

      - run: npm ci
        working-directory: ./sudoku-web

      - run: npm run lint
        working-directory: ./sudoku-web

      - run: npm run build
        working-directory: ./sudoku-web

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: sudoku
          directory: sudoku-web/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

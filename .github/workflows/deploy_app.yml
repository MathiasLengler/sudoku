name: Deploy

on:
  push:
    branches:
      - master

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      # Rust
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      # https://github.com/actions/cache/blob/master/examples.md#rust---cargo
      - uses: actions/cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo test
        uses: actions-rs/cargo@v1
        with:
          command: test

      # Node
      - uses: actions/setup-node@v2
        with:
          node-version: '16'

      # https://github.com/actions/cache/blob/master/examples.md#macos-and-ubuntu
      - uses: actions/cache@v2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm ci
        working-directory: ./sudoku-web

      - run: npm run lint
        working-directory: ./sudoku-web

      - run: npm run build
        working-directory: ./sudoku-web

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sudoku-web/dist

      - name: Deploy to Cloudflare Pages
        uses: distributhor/workflow-webhook@v2
        env:
          webhook_url: ${{ secrets.CLOUDFLARE_WEBHOOK_URL }}
          webhook_secret: ${{ secrets.CLOUDFLARE_WEBHOOK_SECRET }}

      - name: Install dokku SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DOKKU_HETZNER_SSH_PRIVATE_KEY }}
          name: id_rsa-dokku
          known_hosts: ${{ secrets.DOKKU_HETZNER_SSH_HOST_KEY }}

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

      - name: Deploy to dokku
        working-directory: ./sudoku-web/dist
        run: |
          git init
          git config --global user.email "github-ci@lengler.dev"
          git config --global user.name "GitHub CI"
          git add .
          git commit -m "deploy: ${GITHUB_SHA}"
          git remote add dokku ssh://dokku@hetzner.lengler.dev:22/sudoku
          git push dokku master

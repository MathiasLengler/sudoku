name: Deploy

on:
  push:
    branches:
      - "master"
      - "dev"

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      # Rust
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2024-06-23
          targets: wasm32-unknown-unknown
          components: clippy, rust-src

      # https://github.com/actions/cache/blob/main/examples.md#rust---cargo
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # https://doc.rust-lang.org/stable/clippy/usage.html#command-line
      - name: clippy
        run: cargo clippy -- -Dwarnings

      - run: cargo test

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - run: wasm-pack build --out-name index --target web . -- -Z build-std=panic_abort,std
        working-directory: ./sudoku-wasm

      # Node
      - uses: actions/setup-node@v4
        with:
          node-version-file: "sudoku-web/.nvmrc"
          cache: "npm"
          cache-dependency-path: "sudoku-web/package-lock.json"

      - run: npm ci
        working-directory: ./sudoku-web

      - run: npm run lint
        working-directory: ./sudoku-web

      - run: npm run build
        working-directory: ./sudoku-web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker-registry.lengler.dev/sudoku
          tags: |
            # set latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # add tag based on branch name
            type=ref,event=branch

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: docker-registry.lengler.dev
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sudoku-web
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to Coolify
        run: |
          curl --fail-with-body --request GET '${{ github.ref == 'refs/heads/master' && secrets.COOLIFY_WEBHOOK || secrets.COOLIFY_WEBHOOK_DEV }}' --header 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}'

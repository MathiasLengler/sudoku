name: Deploy

on:
  push:
    branches:
      - master

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      # Rust
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2024-03-02
          targets: wasm32-unknown-unknown
          components: clippy

      # https://github.com/actions/cache/blob/main/examples.md#rust---cargo
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # https://doc.rust-lang.org/stable/clippy/usage.html#command-line
      - name: clippy
        run: cargo clippy -- -Dwarnings

      - run: cargo test

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - run: wasm-pack build --out-name index --target web . -- -Z build-std=panic_abort,std
        working-directory: ./sudoku-wasm

      # Node
      - uses: actions/setup-node@v4
        with:
          node-version-file: "sudoku-web/.nvmrc"
          cache: "npm"
          cache-dependency-path: "sudoku-web/package-lock.json"

      - run: npm ci
        working-directory: ./sudoku-web

      - run: npm run lint
        working-directory: ./sudoku-web

      - run: npm run build
        working-directory: ./sudoku-web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: docker-registry.lengler.dev
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sudoku-web
          platforms: linux/arm64
          push: true
          tags: docker-registry.lengler.dev/sudoku:latest

      - name: Deploy to Coolify
        run: |
          curl --fail-with-body --request GET '${{ secrets.COOLIFY_WEBHOOK }}' --header 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}'
